services:
  postgres:
    image: postgres:16-alpine
    container_name: fastkit_invoicing_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fastkit
      POSTGRES_USER: fastkit
      POSTGRES_PASSWORD: fastkit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fastkit -d fastkit"]
      interval: 5s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: fastkit_invoicing_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass "your_password"
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "your_password", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data: